<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display Name - Time Tracker</title>
  <link rel="stylesheet" href="../styles/common.css">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net;
                 script-src 'self' https://cdn.jsdelivr.net;
                 style-src 'self' 'unsafe-inline';
                 img-src 'self' data: blob:;
                 media-src 'self' data: blob:;">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/supabaseClient.js"></script>
  <script src="../scripts/utils.js"></script>
  <script src="../scripts/sessionSync.js"></script>
  <script src="../scripts/displayName.js" defer></script>
</head>
<body>
  <div class="profile-card">
    <div class="profile-header">
      <h1>Welcome!</h1>
      <p>Let's personalize your experience</p>
    </div>

    <div class="profile-form">
      <label for="displayName" class="sr-only">Display name</label>
      <input type="text" id="displayName" placeholder="Enter your display name" required class="auth-input">
      <button id="saveBtn" class="btn-primary profile-submit">Continue</button>
    </div>

    <p class="profile-helper">This will be shown on your dashboard</p>
  </div>
</body>
</html>
