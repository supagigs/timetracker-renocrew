<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Projects - Time Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/common.css">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net https://fonts.googleapis.com https://fonts.gstatic.com;
                 script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com;
                 img-src 'self' data: blob:;
                 media-src 'self' data: blob:;">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/supabaseClient.js"></script>
  <script src="../scripts/utils.js"></script>
  <script src="../scripts/sessionSync.js"></script>
  <script src="../scripts/projects.js" defer></script>
</head>
<body class="projects-page-body">
  <div class="projects-main-container">
    <header class="common-page-header projects-header-bar">
      <div class="projects-header-content" style="padding-top: 80px; padding-left: 10px; padding-right: 10px;">
        <div class="projects-avatar-container">
          <div class="projects-avatar" id="userAvatar"></div>
        </div>
        <div class="projects-search-base">
          <div class="projects-search-icon-wrap">
            <svg class="projects-search-icon" xmlns="http://www.w3.org/2000/svg" width="17" height="18" viewBox="0 0 17 18" fill="none">
              <circle cx="7.41667" cy="7.41667" r="6.66667" stroke="#334155" style="stroke:#334155;stroke:color(display-p3 0.2000 0.2549 0.3333);stroke-opacity:1;" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 12.3816L16.1667 16.5483" stroke="#334155" style="stroke:#334155;stroke:color(display-p3 0.2000 0.2549 0.3333);stroke-opacity:1;" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <input type="text" id="searchInput" class="projects-search-input" placeholder="Search">
        </div>
        <div class="projects-filter-icon-container">
          <div class="projects-filter-icon-inner">
            <svg class="projects-filter-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="16" viewBox="0 0 20 16" fill="none">
              <path d="M15.7474 1.58331L7.41406 1.58331" stroke="#334155" style="stroke:#334155;stroke:color(display-p3 0.2000 0.2549 0.3333);stroke-opacity:1;" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="2" cy="2" r="2" transform="matrix(-1 0 0 1 5.25 0.75)" stroke="#334155" style="stroke:#334155;stroke:color(display-p3 0.2000 0.2549 0.3333);stroke-opacity:1;" stroke-width="1.5"/>
              <path d="M0.752604 9.91669L9.08594 9.91669" stroke="#334155" style="stroke:#334155;stroke:color(display-p3 0.2000 0.2549 0.3333);stroke-opacity:1;" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="17.25" cy="12.75" r="2" stroke="#334155" style="stroke:#334155;stroke:color(display-p3 0.2000 0.2549 0.3333);stroke-opacity:1;" stroke-width="1.5"/>
            </svg>
          </div>
        </div>
      </div>
    </header>

    <div class="projects-content-container" style="padding-top: 100px;">
      <h2 class="projects-title">All Projects</h2>
      <div id="projectsListContainer" class="projects-list-container">
        <div id="loadingMessage" class="projects-loading">Loading projects...</div>
        <div id="projectsList" class="projects-list" style="display: none;"></div>
        <div id="noProjectsMessage" class="projects-empty" style="display: none;">
          <p>No projects assigned to you.</p>
        </div>
      </div>

      <footer>
      <div class="projects-footer">
        <button id="viewReportsBtn" class="projects-view-reports-btn">View Reports</button>
        <div class="projects-help-text">Need Help?</div>
      </div>
      </footer>
    </div>
  </div>
</body>
</html>
