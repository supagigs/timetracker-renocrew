<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - Time Tracker</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="../styles/common.css">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net;
                 script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com;
                 img-src 'self' data: blob:;
                 media-src 'self' data: blob:;">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/supabaseClient.js"></script>
  <script src="../scripts/utils.js"></script>
  <script src="../scripts/sessionSync.js"></script>
  <script src="../scripts/login.js" defer></script>
  <style>
    html, body {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
  </style>  
</head>

<body class="auth-body">
  <div class="window">
    <header class="common-page-header"></header>
  </div>
  <div class="auth-background">
    <div class="auth-design-circle auth-design-circle-1"></div>
    <div class="auth-design-circle auth-design-circle-2"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-card__header">
          <div class="auth-card__visual">
            <img src="../../assets/Overview2.png" class="auth-card__image auth-card__image-2" />
            <img src="../../assets/Overview1.png" class="auth-card__image auth-card__image-1" />
            <img src="../../assets/Ellipse 32.svg" class="auth-card__shadow auth-card__shadow-2"/>
            <img src="../../assets/Ellipse 33.svg" class="auth-card__shadow auth-card__shadow-1"/>
          </div>
          
          <h1 class="auth-card__title" style="font-size: 26px;">Track Your Time</h1>
          <p id="appVersion" class="auth-card__description" style="margin-top: 2px; font-size: 12px; color: #8BA5BC;"></p>
          <p class="auth-card__description" style=" font-size: 15px; color:black;">
            Boost productivity with precise time tracking and clear work insights.
          </p>
        </div>

        <div class="auth-form">
          <div class="auth-input-group">
            <label for="email" class="auth-input-label" style="font-size: 14px;">Email</label>
            <div class="auth-input-wrapper">
              <div class="auth-input-icon">
                  <img
                    id="emailIcon"
                    src="../../assets/mail_original.svg"
                    alt="email icon"
                    width="20" height="20" viewBox="0 0 20 20" fill="none"
                  />
              </div>
              <input
                type="email"
                id="email"
                placeholder="yourname@email.com"
                required
                class="auth-input auth-input-focus"
                autocomplete="username"
                style="overflow: hidden; padding-left: 40px;outline: none; box-shadow: 0 0 0 2px rgba(0, 81, 233, 0.1);"
              >
            </div>
          </div>

          <div class="auth-input-group">
            <label for="password" class="auth-input-label" style="font-size: 14px;">Password</label>
            <div class="auth-input-wrapper">
              <div class="auth-input-icon">
                  <img
                  id="passwordIcon"
                  src="../../assets/lock_original.svg"
                  alt="password icon"
                  width="20" height="20" viewBox="0 0 20 20" fill="none"
                />
                </svg>
              </div>
              <input
                type="password"
                id="password"
                placeholder="Enter Your Password"
                required
                class="auth-input auth-input-focus"
                autocomplete="current-password"
              >
            </div>
          </div>

          <div id="errorMessage" class="auth-error-message" style="display: none;"></div>

          <button id="loginBtn" class="auth-submit-btn">Log in</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
