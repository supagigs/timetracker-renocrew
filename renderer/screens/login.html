<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Time Tracker</title>
  <link rel="stylesheet" href="../styles/common.css">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 connect-src 'self' https://*.supabase.co;
                 script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
                 style-src 'self' 'unsafe-inline';
                 img-src 'self' data: blob:;
                 media-src 'self' data: blob:;">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/supabaseClient.js"></script>
  <script src="../scripts/utils.js"></script>
  <script src="../scripts/login.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>Time Tracker</h1>
    <p>Track your productivity and work time</p>
    
    <div class="form-group">
      <input type="email" id="email" placeholder="Enter your email" required>
      
      <!-- Category dropdown (only shown for new users) -->
      <div id="categoryGroup" class="form-group" style="display: none;">
        <label for="category" style="display: block; color: #cbd5e1; margin-bottom: 10px; font-size: 0.9rem; text-align: left;">
          Select your category:
        </label>
        <select id="category" class="session-select" style="width: 100%;">
          <option value="">-- Select Category --</option>
          <option value="Client">Client</option>
          <option value="Freelancer">Freelancer</option>
        </select>
      </div>
      
      <!-- Projects section (only shown for Clients) -->
      <div id="projectsGroup" class="form-group" style="display: none;">
        <label style="display: block; color: #cbd5e1; margin-bottom: 10px; font-size: 0.9rem; text-align: left;">
          Add Projects (you can add multiple):
        </label>
        <div id="projectsContainer" style="margin-bottom: 10px;">
          <!-- Projects will be added here dynamically -->
        </div>
        <div style="display: flex; gap: 10px;">
          <input 
            type="text" 
            id="newProjectInput" 
            placeholder="Enter project name" 
            style="flex: 1; padding: 10px 15px; border: 2px solid #475569; border-radius: 8px; background: #334155; color: #ffffff; font-size: 1rem;"
            onkeypress="if(event.key === 'Enter') addProject()"
          />
          <button 
            type="button" 
            onclick="addProject()" 
            class="btn-secondary" 
            style="padding: 10px 20px; white-space: nowrap;"
          >
            Add Project
          </button>
        </div>
        <div id="projectsList" style="margin-top: 10px; min-height: 30px;">
          <!-- Selected projects will be displayed here -->
        </div>
      </div>
      
      <button id="loginBtn" class="btn-primary">Login / Sign Up</button>
    </div>
    
    <div class="info-text">
      <p>Enter your email to start tracking your time</p>
    </div>
  </div>
</body>
</html>
