<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Time Tracker</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="../styles/common.css">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net;
                 script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com;
                 img-src 'self' data: blob:;
                 media-src 'self' data: blob:;">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/supabaseClient.js"></script>
  <script src="../scripts/utils.js"></script>
  <script src="../scripts/sessionSync.js"></script>
  <script src="../scripts/login.js" defer></script>
</head>
<body class="auth-body">
  <header class="common-page-header"></header>
  <div class="auth-background">
    <div class="auth-design-circle auth-design-circle-1"></div>
    <div class="auth-design-circle auth-design-circle-2"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-card__header">
          <div class="auth-card__visual">
            <img src="../../assets/Overview2.png" class="auth-card__image auth-card__image-2" />
            <img src="../../assets/Overview1.png" class="auth-card__image auth-card__image-1" />
          </div>
          
          <h1 class="auth-card__title">Track Your Time</h1>
          <p id="appVersion" class="auth-card__description" style="margin-top: 4px; font-size: 12px; color: #8BA5BC;"></p>
          <p class="auth-card__description">
            Boost productivity with precise time tracking and clear work insights.
          </p>
        </div>

        <div class="auth-form">
          <div class="auth-input-group">
            <label for="email" class="auth-input-label">Email</label>
            <div class="auth-input-wrapper">
              <div class="auth-input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <path d="M2.5 6.66667L9.0755 11.0504C9.63533 11.4236 10.3647 11.4236 10.9245 11.0504L17.5 6.66667M4.16667 15.8333H15.8333C16.7538 15.8333 17.5 15.0872 17.5 14.1667V5.83333C17.5 4.91286 16.7538 4.16667 15.8333 4.16667H4.16667C3.24619 4.16667 2.5 4.91286 2.5 5.83333V14.1667C2.5 15.0872 3.24619 15.8333 4.16667 15.8333Z" stroke="#8BA5BC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <input
                type="email"
                id="email"
                placeholder="yourname@supagigs.com"
                required
                class="auth-input"
                autocomplete="username"
              >
            </div>
          </div>

          <div class="auth-input-group">
            <label for="password" class="auth-input-label">Password</label>
            <div class="auth-input-wrapper">
              <div class="auth-input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <path d="M5.83333 9.16667V6.66667C5.83333 4.36548 7.69881 2.5 10 2.5C12.3012 2.5 14.1667 4.36548 14.1667 6.66667V9.16667M10 12.5V14.1667M6.66667 17.5H13.3333C14.2538 17.5 15 16.7538 15 15.8333V10.8333C15 9.91286 14.2538 9.16667 13.3333 9.16667H6.66667C5.74619 9.16667 5 9.91286 5 10.8333V15.8333C5 16.7538 5.74619 17.5 6.66667 17.5Z" stroke="#8BA5BC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <input
                type="password"
                id="password"
                placeholder="enter your password"
                required
                class="auth-input"
                autocomplete="current-password"
              >
            </div>
          </div>

          <div id="errorMessage" class="auth-error-message" style="display: none;"></div>

          <button id="loginBtn" class="auth-submit-btn">Log in</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
