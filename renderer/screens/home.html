<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Time Tracker</title>
  <link rel="stylesheet" href="../styles/common.css">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 connect-src 'self' https://*.supabase.co;
                 script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
                 style-src 'self' 'unsafe-inline';
                 img-src 'self' data: blob:;
                 media-src 'self' data: blob:;">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/supabaseClient.js"></script>
  <script src="../scripts/utils.js"></script>
  <script src="../scripts/home.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>Welcome back!</h1>
    <p id="welcomeText">Hello there!</p>
    
    <div class="button-group">
      <button id="clockInBtn" class="btn-primary">Clock In</button>
      <button id="projectsBtn" class="btn-secondary" style="display: none;">Projects</button>
      <button id="reportBtn" class="btn-secondary">View Reports</button>
      <button id="logoutBtn" class="btn-danger">Logout</button>
    </div>
    
    <div class="info-text">
      <p id="infoText">Click "Clock In" to start tracking your work time</p>
    </div>
  </div>
</body>
</html>
