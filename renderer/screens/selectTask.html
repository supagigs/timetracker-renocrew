<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Task - Time Tracker</title>
  <link rel="stylesheet" href="../styles/common.css">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net;
                 script-src 'self' https://cdn.jsdelivr.net;
                 style-src 'self' 'unsafe-inline';
                 img-src 'self' data: blob:;
                 media-src 'self' data: blob:;">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/supabaseClient.js"></script>
  <script src="../scripts/utils.js"></script>
  <script src="../scripts/sessionSync.js"></script>
  <script src="../scripts/selectTask.js" defer></script>
</head>
<body>
  <header class="common-page-header"></header>
  <div class="container">
    <h1>Select Task</h1>
    <p id="welcomeText">Choose a task to work on</p>
    
    <div class="clock-in-info">
      <div class="info-card">
        <h3>Session Information</h3>
        <p><strong>Date:</strong> <span id="currentDate"></span></p>
        <p><strong>Time:</strong> <span id="currentTime"></span></p>
        <p><strong>User:</strong> <span id="userName"></span></p>
        <p><strong>Project:</strong> <span id="projectName"></span></p>
      </div>
    </div>

    <!-- Task Selection -->
    <div id="taskSelectionGroup" class="form-group project-selection-group">
      <label for="taskSelect" class="project-selection-label">
        Select Task (Optional):
      </label>
      <select id="taskSelect" class="session-select project-select-full">
        <option value="">Loading tasks...</option>
      </select>
      <p id="noTasksMessage" class="no-projects-message">
        No tasks assigned to you for this project. You can proceed without selecting a task.
      </p>
    </div>
    
    <div class="button-group">
      <button id="startSessionBtn" class="btn-primary">Start Work Session</button>
      <button id="backBtn" class="btn-secondary btn-github">Back to Projects</button>
    </div>
    
    <div class="info-text">
      <p>Optionally select a task, then click "Start Work Session" to begin tracking your time</p>
    </div>
  </div>
</body>
</html>
