<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - Time Tracker</title>
  <link rel="stylesheet" href="../styles/common.css">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net;
                 script-src 'self' https://cdn.jsdelivr.net;
                 style-src 'self' 'unsafe-inline';
                 img-src 'self' data: blob: https://*.supabase.co;
                 media-src 'self' data: blob:;">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../scripts/supabaseClient.js"></script>
  <script src="../scripts/utils.js"></script>
  <script src="../scripts/idleTracker.js"></script>
  <script src="../scripts/report.js" defer></script>
</head>
<body>
  <div class="report-container">
    <div class="logo-header">
      <img src="../../SupagigsLogo.png" alt="Supatimetracker logo">
      <div class="logo-text">
        <h1 class="logo-title">Supatimetracker Reports</h1>
        <p class="logo-tagline">Insights from your tracked sessions</p>
      </div>
    </div>
    
    <!-- Monthly Chart Section -->
    <div class="chart-section">
      <h2>Last 30 Days Activity</h2>
      <div class="chart-container">
        <canvas id="monthlyChart" width="800" height="400"></canvas>
      </div>
    </div>

    <!-- Summary Statistics -->
    <div class="summary-section">
      <h2>Monthly Summary</h2>
      <div class="summary-stats">
        <div class="summary-item">
          <span class="summary-label">Total Hours This Month:</span>
          <span id="totalHoursMonth" class="summary-value">0</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Average Daily Hours:</span>
          <span id="avgDailyHours" class="summary-value">0</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Most Productive Day:</span>
          <span id="mostProductiveDay" class="summary-value">-</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Total Idle Time This Month:</span>
          <span id="totalIdleTimeMonth" class="summary-value">0</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Average Idle Percentage:</span>
          <span id="avgIdlePercentage" class="summary-value">0%</span>
        </div>
      </div>
    </div>

    <!-- Screenshots Section -->
    <div class="screenshots-section">
      <h2>Screenshots</h2>
      <div class="screenshot-controls">
        <select id="sessionSelect" class="session-select">
          <option value="">Select a session to view screenshots</option>
        </select>
        <button id="loadScreenshotsBtn" class="btn-info">Load Screenshots</button>
      </div>
      <div id="screenshotsContainer" class="screenshots-container">
        <p class="no-screenshots">Select a session to view screenshots</p>
      </div>
    </div>

    <!-- Navigation -->
    <div class="nav-section">
      <button id="homeBtn" class="btn-primary">Back to Home</button>
      <!--button id="trackerBtn" class="btn-success">Start Tracking</button>-->
    </div>
  </div>
</body>
</html>
