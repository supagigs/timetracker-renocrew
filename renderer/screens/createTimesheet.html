<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Timesheet - Time Tracker</title>
  <link rel="stylesheet" href="../styles/common.css">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net;
                 script-src 'self' https://cdn.jsdelivr.net;
                 style-src 'self' 'unsafe-inline';
                 img-src 'self' data: blob:;
                 media-src 'self' data: blob:;">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../scripts/supabaseClient.js"></script>
  <script src="../scripts/utils.js"></script>
  <script src="../scripts/sessionSync.js"></script>
  <script src="../scripts/createTimesheet.js" defer></script>
</head>
<body>
  <header class="common-page-header"></header>
  <div class="container">
    <h1>Create Timesheet</h1>
    <p id="welcomeText">Setting up your timesheet entry</p>
    
    <div class="clock-in-info">
      <div class="info-card">
        <h3>Timesheet Information</h3>
        <p><strong>Date:</strong> <span id="currentDate"></span></p>
        <p><strong>Time:</strong> <span id="currentTime"></span></p>
        <p><strong>User:</strong> <span id="userName"></span></p>
        <p><strong>Project:</strong> <span id="projectName"></span></p>
        <p><strong>Task:</strong> <span id="taskName"></span></p>
      </div>
    </div>

    <!-- Timesheet Details (Read-Only) -->
    <div id="timesheetDetailsGroup" class="form-group project-selection-group">
      <label class="project-selection-label">Timesheet Details:</label>
      
      <div class="timesheet-detail-row">
        <label for="companyDisplay" class="timesheet-detail-label">Company:</label>
        <input type="text" id="companyDisplay" class="session-select project-select-full" readonly disabled>
      </div>

      <div class="timesheet-detail-row">
        <label for="seriesDisplay" class="timesheet-detail-label">Series:</label>
        <input type="text" id="seriesDisplay" class="session-select project-select-full" readonly disabled>
      </div>

      <div class="timesheet-detail-row">
        <label for="activityTypeDisplay" class="timesheet-detail-label">Activity Type:</label>
        <input type="text" id="activityTypeDisplay" class="session-select project-select-full" value="Execution" readonly disabled>
      </div>

      <div class="timesheet-detail-row">
        <label for="projectDisplay" class="timesheet-detail-label">Project:</label>
        <input type="text" id="projectDisplay" class="session-select project-select-full" readonly disabled>
      </div>

      <div class="timesheet-detail-row">
        <label for="taskDisplay" class="timesheet-detail-label">Task:</label>
        <input type="text" id="taskDisplay" class="session-select project-select-full" readonly disabled>
      </div>
    </div>

    <!-- Status Message -->
    <div id="statusMessage" class="info-text" style="display: none;">
      <p id="statusText"></p>
    </div>
    
    <div class="button-group">
      <button id="createTimesheetBtn" class="btn-primary">Go to Tracker</button>
      <button id="backBtn" class="btn-secondary btn-github">Back to Home</button>
    </div>
    
    <div class="info-text">
      <p>Click "Go to Tracker" to proceed to the time tracker. The timesheet will be created in Frappe when you click the "Start" button in the tracker screen.</p>
    </div>
  </div>
</body>
</html>
